# H27: Whisper large-v2 VoiceFM on GSD labels — seed 43
# Whisper encoder frozen (~637M params) + contrastive training on GSD labels
model:
  audio_encoder:
    type: whisper
    backbone: openai/whisper-large-v2
    freeze_backbone: true
    unfreeze_last_n: 0
    projection_dim: 256
loss:
  hard_negative_mining: true
  hard_negative_beta: 1.0
data:
  use_gsd: true
  splits:
    train: 0.70
    val: 0.15
    test: 0.15
    seed: 43
    stratify_by: disease_category
