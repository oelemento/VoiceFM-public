# Experiment K: Swap HuBERT for Whisper large-v2 encoder
# Whisper: trained on 680K hours of labeled audio for ASR
# Encoder frozen (~637M params), only projection head + task embedding trained
# Input: 30s log-mel spectrogram → 1500 tokens × 1280 dim → mean-pool → 256d
model:
  audio_encoder:
    type: whisper
    backbone: openai/whisper-large-v2
    freeze_backbone: true
    unfreeze_last_n: 0
    projection_dim: 256
